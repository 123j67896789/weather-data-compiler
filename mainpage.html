<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOAA Tornado Watch & Outlook Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #0c1427;
        --card: #13203c;
        --text: #edf3ff;
        --muted: #a9b9d8;
        --accent: #4aa3ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1a2f5a, var(--bg));
      }

      main {
        max-width: 1160px;
        margin: 1rem auto;
        padding: 0 1rem 1.75rem;
      }

      h1 {
        margin: 0.5rem 0;
        font-size: 1.55rem;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        margin-top: 0.85rem;
        padding: 0.9rem;
        border-radius: 12px;
        background: color-mix(in oklab, var(--card), black 15%);
        border: 1px solid color-mix(in oklab, var(--muted), transparent 68%);
      }

      .controls {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        cursor: pointer;
        border-radius: 10px;
        padding: 0.55rem 0.8rem;
        color: #061631;
        background: var(--accent);
        font-weight: 700;
      }

      #status {
        margin-top: 0.7rem;
        color: var(--muted);
        font-size: 0.93rem;
      }

      #map {
        margin-top: 0.9rem;
        height: 600px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid color-mix(in oklab, var(--muted), transparent 70%);
      }

      .legend {
        margin-top: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        color: var(--muted);
        font-size: 0.86rem;
      }

      .swatch {
        width: 0.95rem;
        height: 0.95rem;
        border-radius: 3px;
        display: inline-block;
        vertical-align: middle;
        margin-right: 0.35rem;
      }

      code {
        color: #cae0ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NOAA/NWS Real-Time Tornado Watch Map</h1>
      <p class="subtitle">
        Real-data overlays only: active Tornado Watches from <code>api.weather.gov</code> and Day 1
        SPC tornado outlook polygons from <code>spc.noaa.gov</code>. No synthetic forecast model is used.
      </p>

      <section class="panel">
        <div class="controls">
          <button id="refreshData">Refresh NOAA Data</button>
          <button id="fitUsView">Fit Continental U.S.</button>
          <button id="clearMap">Clear Overlays</button>
        </div>
        <p id="status">Loading live NOAA feeds…</p>
      </section>

      <section class="panel">
        <div id="map" aria-label="Live tornado forecast map"></div>
        <div class="legend">
          <span><span class="swatch" style="background:#e63946"></span>NWS Tornado Watch (active)</span>
          <span><span class="swatch" style="background:#ff8f1f"></span>SPC Tornado Outlook Area</span>
        </div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const map = L.map('map', { zoomControl: true }).setView([38.8, -96.5], 4);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const status = document.getElementById('status');
      const watchLayer = L.layerGroup().addTo(map);
      const outlookLayer = L.layerGroup().addTo(map);

      const FEEDS = {
        nwsTornadoWatches: 'https://api.weather.gov/alerts/active?event=Tornado%20Watch',
        spcTornadoOutlookCandidates: [
          'https://www.spc.noaa.gov/products/outlook/day1otlk_torn.lyr.geojson',
          'https://www.spc.noaa.gov/products/outlook/day1otlk_cat.lyr.geojson'
        ]
      };

      async function fetchJson(url) {
        const response = await fetch(url, {
          headers: {
            Accept: 'application/geo+json, application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} for ${url}`);
        }

        return response.json();
      }

      async function fetchFirstAvailable(urls) {
        let lastError;
        for (const url of urls) {
          try {
            const payload = await fetchJson(url);
            return { url, payload };
          } catch (error) {
            lastError = error;
          }
        }

        throw lastError || new Error('No feed URL could be loaded.');
      }

      async function loadNwsTornadoWatches() {
        watchLayer.clearLayers();

        const data = await fetchJson(FEEDS.nwsTornadoWatches);
        const features = Array.isArray(data.features) ? data.features : [];

        const layer = L.geoJSON(features, {
          style: {
            color: '#e63946',
            weight: 2,
            fillColor: '#e63946',
            fillOpacity: 0.26
          },
          onEachFeature: (feature, featureLayer) => {
            const p = feature.properties || {};
            featureLayer.bindPopup(
              `<strong>${p.event || 'Tornado Watch'}</strong><br/>` +
                `${p.areaDesc || 'Area unavailable'}<br/>` +
                `Issued: ${p.sent ? new Date(p.sent).toLocaleString() : 'Unknown'}<br/>` +
                `Expires: ${p.ends ? new Date(p.ends).toLocaleString() : 'Unknown'}<br/>` +
                `Source: ${p.senderName || 'National Weather Service'}`
            );
          }
        });

        layer.addTo(watchLayer);
        return features.length;
      }

      async function loadSpcOutlook() {
        outlookLayer.clearLayers();

        const { url, payload } = await fetchFirstAvailable(FEEDS.spcTornadoOutlookCandidates);
        const features = Array.isArray(payload.features) ? payload.features : [];

        const layer = L.geoJSON(features, {
          style: {
            color: '#ff8f1f',
            weight: 1.8,
            fillColor: '#ff8f1f',
            fillOpacity: 0.2
          },
          onEachFeature: (feature, featureLayer) => {
            const p = feature.properties || {};
            const threshold = p.threshold || p.DN || 'N/A';
            const issue = p.ISSUE || p.issue || p.valid || 'Unknown';
            const expire = p.EXPIRE || p.expire || 'Unknown';
            featureLayer.bindPopup(
              `<strong>SPC Day 1 Outlook</strong><br/>` +
                `Threshold: ${threshold}${String(threshold).includes('%') ? '' : '%'}<br/>` +
                `Issued: ${issue}<br/>` +
                `Expires: ${expire}<br/>` +
                `Feed: ${url}`
            );
          }
        });

        layer.addTo(outlookLayer);
        return { count: features.length, feedUrl: url };
      }

      function fitToDataBounds() {
        const layerBounds = [];

        if (watchLayer.getLayers().length > 0) {
          layerBounds.push(watchLayer.getBounds());
        }
        if (outlookLayer.getLayers().length > 0) {
          layerBounds.push(outlookLayer.getBounds());
        }

        if (layerBounds.length === 0) {
          return;
        }

        const combined = layerBounds[0];
        for (let i = 1; i < layerBounds.length; i += 1) {
          combined.extend(layerBounds[i]);
        }

        map.fitBounds(combined.pad(0.2));
      }

      async function refreshAllData() {
        status.textContent = 'Refreshing NOAA feeds…';

        try {
          const [watchCount, outlookResult] = await Promise.all([loadNwsTornadoWatches(), loadSpcOutlook()]);

          fitToDataBounds();

          status.textContent =
            `Updated ${new Date().toLocaleString()}: ` +
            `${watchCount} active NWS Tornado Watch polygons and ` +
            `${outlookResult.count} SPC outlook polygons loaded. ` +
            `SPC source: ${outlookResult.feedUrl}`;
        } catch (error) {
          console.error(error);
          status.textContent =
            `Failed to load one or more NOAA feeds: ${error.message}. ` +
            `The feed may be unavailable, blocked, or temporarily rate-limited.`;
        }
      }

      document.getElementById('refreshData').addEventListener('click', refreshAllData);
      document.getElementById('fitUsView').addEventListener('click', () => map.setView([38.8, -96.5], 4));
      document.getElementById('clearMap').addEventListener('click', () => {
        watchLayer.clearLayers();
        outlookLayer.clearLayers();
        status.textContent = 'Map overlays cleared.';
      });

      refreshAllData();
    </script>
  </body>
</html>
